<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Respuesta desde Apache 3</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding-top: 100px; 
            background-color: #ffebee; /* Light Red */
            color: #333;
        }
        .container {
            background-color: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            display: inline-block;
        }
        h1 { color: #c62828; }
        .node-id {
            font-size: 1.2em;
            font-weight: bold;
            color: #fff;
            background-color: #c62828;
            padding: 10px 20px;
            border-radius: 5px;
            display: inline-block;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Respuesta desde Apache 3</h1>
        <p>Esta petición fue procesada exitosamente.</p>
        <div class="node-id">Nodo Activo: Apache 3</div>
    </div>
</body>
</html>
