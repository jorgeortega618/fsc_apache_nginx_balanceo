user  nginx;
worker_processes  1;

error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'upstream: $upstream_addr';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Definir el grupo de servidores backend
    upstream backend_servers {
        server apache1:80;
        server apache2:80;
        server apache3:80;
    }

    server {
        listen       80;
        server_name  localhost;

        location / {
            # Pasar tráfico a los servidores backend
            proxy_pass http://backend_servers;
            
            # Pasar cabeceras importantes
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Añadir una cabecera en la respuesta indicando qué backend la procesó
            add_header X-Backend-Server $upstream_addr always;
            
            # Permitir CORS para que el dashboard local funcione
            add_header Access-Control-Allow-Origin * always;
        }
        
        # Página de error por defecto
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
