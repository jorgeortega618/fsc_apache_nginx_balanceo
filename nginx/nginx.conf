# =========================================================================
# CONFIGURACIÓN GLOBAL (Core)
# =========================================================================
# Define el usuario del sistema bajo el cual correrá el proceso de Nginx.
user  nginx;

# Número de procesos trabajadores. Lo limitamos a "1" en esta demostración 
# para forzar que todas las conexiones sean gestionadas por el mismo hilo
# y asegurar un comportamiento "Round-Robin" (turno por turno) perfecto.
# En producción, esto normalmente se configura en "auto" (uno por núcleo del CPU).
worker_processes  1;

# Define dónde se guardarán los errores y el archivo con el Process ID (PID).
error_log  /var/log/nginx/error.log notice;
pid        /var/run/nginx.pid;

# =========================================================================
# GESTIÓN DE EVENTOS (Nivel de Red)
# =========================================================================
events {
    # Define la cantidad máxima de conexiones simultáneas que cada 
    # worker_process puede abrir. (Total = worker_processes * worker_connections)
    worker_connections  1024;
}

# =========================================================================
# CONFIGURACIÓN HTTP (Capa de Aplicación Web)
# =========================================================================
http {
    # Incluye los tipos MIME estándar (para que Nginx sepa diferenciar
    # entre archivos HTML, CSS, JS, imágenes, etc.)
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Define el formato del registro de accesos. Hemos añadido al final la
    # variable '$upstream_addr' para registrar en el log interno qué servidor  
    # Apache backend específico procesó nuestra petición de carga.
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'upstream: $upstream_addr';

    # Archivo donde se guardará el registro de todas las peticiones exitosas.
    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # ---------------------------------------------------------------------
    # 1. EL GRUPO DE BALANCEO DE CARGA (The Upstream Block)
    # ---------------------------------------------------------------------
    # Aquí definimos lógicamente un clúster llamado "backend_servers".
    # Al no especificar ningún algoritmo adicional (como ip_hash o least_conn),
    # Nginx asume automáticamente el algoritmo clásico: "Round-Robin" uniforme.
    upstream backend_servers {
        server apache1:80;  # Nodo Backend 1 (contenedor 1)
        server apache2:80;  # Nodo Backend 2 (contenedor 2)
        server apache3:80;  # Nodo Backend 3 (contenedor 3)
    }

    # ---------------------------------------------------------------------
    # 2. EL PROXY INVERSO / SERVIDOR DE ENTRADA (El Frontend)
    # ---------------------------------------------------------------------
    server {
        # Puerto por el cual Nginx escuchará internamente (el archivo
        # docker-compose.yml mapea este puerto 80 interno al 8080 en Windows).
        listen       80;
        server_name  localhost;

        # Regla principal: qué hacer cuando el usuario entra a la ruta web "/"
        location / {
            # "proxy_pass" es el corazón de este proyecto. Redirige todo el 
            # tráfico recibido hacia el grupo de balanceo "backend_servers".
            proxy_pass http://backend_servers;
            
            # --- INYECCIÓN DE CABECERAS PARA EL BACKEND ---
            # Como Nginx actúa de intermediario en la red, debemos enviarle a 
            # Apache la información real del visitante original, de lo contrario 
            # Apache pensaría que todas las visitas provienen de Nginx internamente.
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # --- MANIPULACIÓN DE CABECERAS PARA EL CLIENTE ---
            # Generamos esta cabecera y se la enviamos de regreso al navegador
            # para evidenciar qué IP de Apache específica resolvió la petición.
            add_header X-Backend-Server $upstream_addr always;
            
            # Permitir CORS ("Cross-Origin"): Autoriza a nuestra interfaz visual
            # local (dashboard.html vía fetch) para que se comunique sin seguridad extra.
            add_header Access-Control-Allow-Origin * always;
            # Exponemos deliberadamente la cabecera anterior hacia el JavaScript del dashboard.
            add_header Access-Control-Expose-Headers "X-Backend-Server" always;
        }
        
        # Página de error por defecto genérica en caso de caídas masivas.
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}
